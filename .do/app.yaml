name: dochat
region: nyc

services:
  - name: web
    github:
      repo: dimasna/dochat
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    http_port: 3000
    build_command: |
      npm install -g pnpm@10.4.1 --force
      touch .env
      pnpm install --frozen-lockfile
      cd packages/db && npx prisma generate && cd ../..
      cd apps/web && npx next build && cd ../..
      mkdir -p apps/web/.next/standalone/apps/web/.next
      cp -r apps/web/public apps/web/.next/standalone/apps/web/public
      cp -r apps/web/.next/static apps/web/.next/standalone/apps/web/.next/static
    run_command: node apps/web/.next/standalone/apps/web/server.js
    envs:
      - key: HOSTNAME
        value: "0.0.0.0"
        scope: RUN_TIME
      - key: PORT
        value: "3000"
        scope: RUN_TIME
      - key: NODE_ENV
        value: "production"
        scope: RUN_AND_BUILD_TIME
      - key: DATABASE_URL
        value: "__DATABASE_URL__"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        value: "__NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY__"
        scope: RUN_AND_BUILD_TIME
      - key: CLERK_SECRET_KEY
        value: "__CLERK_SECRET_KEY__"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: "/sign-in"
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: "/sign-up"
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_FORCE_REDIRECT_URL
        value: "/workspace"
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_FORCE_REDIRECT_URL
        value: "/workspace"
        scope: RUN_AND_BUILD_TIME
      - key: DIGITALOCEAN_API_TOKEN
        value: "__DIGITALOCEAN_API_TOKEN__"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_PROJECT_ID
        value: "__DO_PROJECT_ID__"
        scope: RUN_AND_BUILD_TIME
      - key: DO_AGENT_REGION
        value: "__DO_AGENT_REGION__"
        scope: RUN_AND_BUILD_TIME
      - key: DO_AGENT_MODEL_UUID
        value: "__DO_AGENT_MODEL_UUID__"
        scope: RUN_AND_BUILD_TIME
      - key: DO_EMBEDDING_MODEL_UUID
        value: "__DO_EMBEDDING_MODEL_UUID__"
        scope: RUN_AND_BUILD_TIME
      - key: DODO_PAYMENTS_API_KEY
        value: "__DODO_PAYMENTS_API_KEY__"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DODO_PAYMENTS_ENVIRONMENT
        value: "__DODO_PAYMENTS_ENVIRONMENT__"
        scope: RUN_AND_BUILD_TIME
      - key: DODO_PAYMENTS_WEBHOOK_SECRET
        value: "__DODO_PAYMENTS_WEBHOOK_SECRET__"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DODO_STARTER_PRODUCT_ID
        value: "__DODO_STARTER_PRODUCT_ID__"
        scope: RUN_AND_BUILD_TIME
      - key: DODO_GROWTH_PRODUCT_ID
        value: "__DODO_GROWTH_PRODUCT_ID__"
        scope: RUN_AND_BUILD_TIME
      - key: DODO_SCALE_PRODUCT_ID
        value: "__DODO_SCALE_PRODUCT_ID__"
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_WIDGET_URL
        value: "${widget.PUBLIC_URL}"
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_LANDING_WIDGET_ORG_ID
        value: "__NEXT_PUBLIC_LANDING_WIDGET_ORG_ID__"
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_LANDING_WIDGET_AGENT_ID
        value: "__NEXT_PUBLIC_LANDING_WIDGET_AGENT_ID__"
        scope: RUN_AND_BUILD_TIME

  - name: widget
    github:
      repo: dimasna/dochat
      branch: main
      deploy_on_push: true
    source_dir: /
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    http_port: 3000
    build_command: |
      npm install -g pnpm@10.4.1 --force
      touch .env
      pnpm install --frozen-lockfile
      cd apps/widget && npx next build && cd ../..
      mkdir -p apps/widget/.next/standalone/apps/widget/.next
      cp -r apps/widget/public apps/widget/.next/standalone/apps/widget/public
      cp -r apps/widget/.next/static apps/widget/.next/standalone/apps/widget/.next/static
    run_command: node apps/widget/.next/standalone/apps/widget/server.js
    envs:
      - key: HOSTNAME
        value: "0.0.0.0"
        scope: RUN_TIME
      - key: PORT
        value: "3000"
        scope: RUN_TIME
      - key: NODE_ENV
        value: "production"
        scope: RUN_AND_BUILD_TIME
      - key: NEXT_PUBLIC_API_URL
        value: "${web.PUBLIC_URL}"
        scope: RUN_AND_BUILD_TIME

ingress:
  rules:
    - component:
        name: web
      match:
        path:
          prefix: /
    - component:
        name: widget
      match:
        path:
          prefix: /widget
